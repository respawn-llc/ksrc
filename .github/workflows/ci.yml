name: ci

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Read version
        run: |
          echo "KSRC_VERSION=$(tr -d ' \n' < VERSION)" >> "$GITHUB_ENV"

      - name: Set up Java
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6.1.0
        with:
          gradle-version: current
          cache-provider: enhanced

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Install ripgrep
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep

      - name: Lint
        run: |
          ./scripts/ci-format.sh
          go vet ./...

      - name: Build
        run: |
          go build ./...
          ./scripts/build.sh

      - name: Test
        run: go test ./...

  smoke-sample:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Read version
        run: |
          echo "KSRC_VERSION=$(tr -d ' \n' < VERSION)" >> "$GITHUB_ENV"

      - name: Set up Java
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4.0.1

      - name: Install Android SDK packages
        run: |
          sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6.1.0
        with:
          gradle-version: current
          cache-provider: enhanced

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Install ripgrep
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep

      - name: Build ksrc binary
        run: ./scripts/build.sh

      - name: Smoke test against sample project
        run: ./bin/ksrc search LocalDate --module org.jetbrains.kotlinx:kotlinx-datetime --project ./sample
